config-version = 2
start-at-login = true

# Normalization (keeps the tree clean)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# All windows float via on-window-detected (snap with alt+shift+arrows)
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when switching monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE="$(/opt/homebrew/bin/aerospace list-workspaces --focused)"']

# Keep workspaces 1-6 alive
persistent-workspaces = ["1", "2", "3", "4", "5", "6"]

exec-on-workspace-change = ['/bin/bash', '-c', '$HOME/.config/aerospace/workspace-changed.sh']

[[on-window-detected]]
    check-further-callbacks = true
    run = ['layout floating', 'exec-and-forget /opt/homebrew/bin/sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE="$(/opt/homebrew/bin/aerospace list-workspaces --focused)"']

[key-mapping]
    preset = 'qwerty'

# 5px gaps between windows, 2px edge padding for border visibility
[gaps]
    inner.horizontal = 5
    inner.vertical =   5
    outer.left =       2
    outer.bottom =     2
    outer.top =        44
    outer.right =      2

[mode.main.binding]

    # --- Snap windows: opt + shift + arrows (double-tap cycles halves → quarters) ---
    alt-shift-left  = 'exec-and-forget $HOME/.config/aerospace/snap-window.sh left'
    alt-shift-down  = 'exec-and-forget $HOME/.config/aerospace/snap-window.sh down'
    alt-shift-up    = 'exec-and-forget $HOME/.config/aerospace/snap-window.sh up'
    alt-shift-right = 'exec-and-forget $HOME/.config/aerospace/snap-window.sh right'
    alt-shift-f     = 'exec-and-forget $HOME/.config/aerospace/snap-window.sh full'

    # --- Focus (navigate): opt + arrows ---
    alt-left  = 'focus left'
    alt-down  = 'focus down'
    alt-up    = 'focus up'
    alt-right = 'focus right'

    # --- Layout ---
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-m     = 'exec-and-forget $HOME/.config/aerospace/minimize-window.sh'
    alt-q     = ['close --quit-if-last-window', 'exec-and-forget $HOME/.config/aerospace/close-window.sh']

    # --- Resize ---
    alt-equal = 'resize smart +50'
    alt-minus = 'resize smart -50'

    # --- Workspaces: opt + number (touch intent flag so workspace-changed.sh knows it's intentional) ---
    alt-1 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 1']
    alt-2 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 2']
    alt-3 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 3']
    alt-4 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 4']
    alt-5 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 5']
    alt-6 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 6']
    alt-7 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 7']
    alt-8 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 8']
    alt-9 = ['exec-and-forget touch /tmp/.aero-intent', 'workspace 9']

    # --- Move window to workspace: opt + shift + number ---
    alt-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 1']
    alt-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 2']
    alt-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 3']
    alt-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 4']
    alt-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 5']
    alt-shift-6 = ['move-node-to-workspace 6', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 6']
    alt-shift-7 = ['move-node-to-workspace 7', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 7']
    alt-shift-8 = ['move-node-to-workspace 8', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 8']
    alt-shift-9 = ['move-node-to-workspace 9', 'exec-and-forget $HOME/.config/aerospace/move-window.sh 9']

    # --- Quick switch ---
    alt-tab = ['exec-and-forget touch /tmp/.aero-intent', 'workspace-back-and-forth']
    alt-shift-tab = ['exec-and-forget touch /tmp/.aero-intent', 'move-workspace-to-monitor --wrap-around next']

    # --- Launch apps: opt + key ---
    alt-b = 'exec-and-forget $HOME/.config/aerospace/launch-app.sh Safari'
    alt-o = 'exec-and-forget $HOME/.config/aerospace/launch-app.sh Obsidian'
    alt-t = 'exec-and-forget $HOME/.config/aerospace/launch-app.sh Ghostty'
    alt-s = 'exec-and-forget $HOME/.config/aerospace/launch-app.sh Signal'
    alt-z = 'exec-and-forget $HOME/.config/aerospace/launch-app.sh zoom.us'

    # --- Service mode (opt+shift+;) ---
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']
    h = ['join-with left', 'mode main']
    j = ['join-with down', 'mode main']
    k = ['join-with up', 'mode main']
    l = ['join-with right', 'mode main']
